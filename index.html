<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #0f0f0f;
      font-family: sans-serif;
    }
    button {
      padding: 20px 48px;
      font-size: 1.4rem;
      background: #fff;
      color: #0f0f0f;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }
    button:hover { background: #e0e0e0; }
    button:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <audio id="audio" src="hello.mp3"></audio>
  <button onclick="document.getElementById('audio').play()">Say Hello</button>
</body>
</html>
